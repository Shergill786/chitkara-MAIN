<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Contact Us</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<section class="contact-section">
    <div class="contact-container">

        <!-- Back Button -->
<div class="back-btn">
    <a href="javascript:history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</div>
        <!-- Hospital Info -->
        <div class="contact-info">
            <h2>Hospital Contact Information</h2>
            <p>Trusted healthcare services available 24×7.</p>

            <div class="info-box">
                <i class="fas fa-phone"></i>
                <span>+91 98765 43210</span>
            </div>

            <div class="info-box">
                <i class="fas fa-envelope"></i>
                <span>support@hospitalfinder.com</span>
            </div>

            <div class="info-box">
                <i class="fas fa-clock"></i>
                <span>Emergency Services: 24×7</span>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <form>
                <h2>Hospital Service Request</h2>

                <div class="input-box">
                    <input type="text" required>
                    <span>Patient Name</span>
                </div>

                <div class="input-box">
                    <input type="tel" required>
                    <span>Mobile Number</span>
                </div>

                <div class="input-box">
                    <input type="email">
                    <span>Email (Optional)</span>
                </div>

                <!-- ENTER LOCATION -->
                <div class="input-box">
                    <input type="text" required>
                    <span>Enter Your Location (City / Area / Pincode)</span>
                </div>

                <!-- SERVICE -->
                <div class="select-box">
                    <label>Required Hospital Service</label>
                    <select required>
                        <option value="">-- Select Service --</option>
                        <option>OPD Consultation</option>
                        <option>Emergency Care</option>
                        <option>ICU / Critical Care</option>
                        <option>Ambulance Service</option>
                        <option>Laboratory Tests</option>
                        <option>Radiology (X-Ray / CT / MRI)</option>
                        <option>Pharmacy</option>
                        <option>Health Checkup</option>
                    </select>
                </div>

                <div class="input-box">
                    <textarea required></textarea>
                    <span>Describe Health Issue / Requirement</span>
                </div>

                <button type="submit">
                    <i class="fas fa-paper-plane"></i> Submit Request
                </button>
            </form>
        </div>

    </div>
</section>

</body>
</html>
