<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment</title>
  <link rel="stylesheet" href="css/appointment.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header>
  <nav>
    <h1 class="logo">
      <span class="logo-icon">🏥</span>
      Hospital Finder
    </h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="hospitals_delhi.html">Hospitals</a></li>
      <li><a href="emergency.html">Emergency</a></li>
    </ul>
  </nav>
</header>

<!-- ================= PAGE TITLE ================= -->
<section class="page-title">
  <h2>Book an Appointment</h2>
  <p>Fill in the details to book your hospital appointment</p>
</section>

<!-- ================= APPOINTMENT FORM ================= -->
<section class="appointment-form">

  <form>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" placeholder="Enter phone number" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="Enter email">
    </div>

    <div class="form-group">
      <label>Select City</label>
      <select required>
        <option value="">Select City</option>
        <option>Delhi</option>
        <option>Mumbai</option>
        <option>Kolkata</option>
        <option>Chennai</option>
        <option>Bangalore</option>
        <option>Pune</option>
      </select>
    </div>

    <div class="form-group">
      <label>Select Hospital</label>
      <select required>
        <option value="">Select Hospital</option>
        <option>City Care Hospital</option>
        <option>LifeLine Multispeciality</option>
        <option>Green Valley Hospital</option>
        <option>Delhi Heart Center</option>
        <option>Metro General Hospital</option>
      </select>
    </div>

    <div class="form-group">
      <label>Select Department</label>
      <select required>
        <option value="">Select Department</option>
        <option>Cardiology</option>
        <option>Orthopedics</option>
        <option>Pediatrics</option>
        <option>General Medicine</option>
        <option>Neurology</option>
      </select>
    </div>

    <div class="form-group">
      <label>Preferred Date</label>
      <input type="date" required>
    </div>

    <div class="form-group">
      <label>Preferred Time</label>
      <input type="time" required>
    </div>

    <div class="form-group">
      <label>Problem Description</label>
      <textarea rows="4" placeholder="Describe your problem"></textarea>
    </div>

    <button type="submit">Confirm Appointment</button>
  </form>

</section>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 Hospital Finder</p>
  <p>Emergency • Contact • Feedback</p>
</footer>

</body>
</html>
