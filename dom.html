<!DOCTYPE html>
<html>
<head>
    <title>Form DOM Styling</title>
</head>
<body>

<h2>Student Form</h2>

<form>
    Name: <input type="text" id="name" class="field"><br><br>
    Email: <input type="email" id="email" class="field"><br><br>
    Roll No: <input type="text" id="roll" class="field"><br><br>
    Branch: <input type="text" id="branch" class="field"><br><br>

    <button type="button" onclick="okFunction()">OK</button>
    <button type="button" onclick="cancelFunction()">Cancel</button>
</form>

<script>
function okFunction() {
    let fields = document.getElementsByClassName("field");

    for (let i = 0; i < fields.length; i++) {
        fields[i].style.color = "blue";
        fields[i].style.backgroundColor = "lightyellow";
        fields[i].style.fontFamily = "Arial";
        fields[i].style.fontSize = "18px";
    }
}

function cancelFunction() {
    let fields = document.getElementsByClassName("field");

    for (let i = 0; i < fields.length; i++) {
        fields[i].style.color = "black";
        fields[i].style.backgroundColor = "white";
        fields[i].style.fontFamily = "initial";
        fields[i].style.fontSize = "16px";
        fields[i].value = ""; // clears input
    }
}
</script>

</body>
</html>
